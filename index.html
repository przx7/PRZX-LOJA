<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRZX.sh STORE</title>
    <style>
        /* Configurações Gerais - Tema Escuro */
        body {
            background-color: #0d0c1d;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Topo / Header */
        header {
            width: 100%;
            background-color: #161233;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-sizing: border-box;
            border-bottom: 2px solid #8a2be2;
        }

        .logo {
            font-size: 1.2rem;
            font-weight: bold;
            color: #a046ff;
        }

        /* Container do Catálogo */
        .container {
            max-width: 400px;
            width: 100%;
            padding: 20px;
            box-sizing: border-box;
        }

        .category-title {
            font-size: 1.1rem;
            color: #ffffff;
            margin-top: 25px;
            margin-bottom: 15px;
            padding-left: 5px;
        }

        /* Card do Produto */
        .product-card {
            background-color: #131129;
            border: 1px solid #251f47;
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 20px;
            transition: transform 0.2s;
        }

        .product-card:hover {
            transform: scale(1.02);
            border-color: #8a2be2;
        }

        .product-image {
            width: 100%;
            height: 180px;
            object-fit: cover;
            display: block;
        }

        .product-info {
            padding: 15px;
        }

        .product-name {
            font-size: 1rem;
            font-weight: 600;
            margin: 0 0 10px 0;
        }

        .product-price {
            font-size: 1.2rem;
            color: #ffffff;
            font-weight: bold;
            margin: 0;
        }

        .payment-method {
            font-size: 0.75rem;
            color: #a0a0a0;
            margin: 2px 0 15px 0;
        }

        /* Botão de Compra */
        .btn-buy {
            display: block;
            width: 100%;
            background-color: #8a2be2;
            color: white;
            text-align: center;
            padding: 10px 0;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
            font-size: 0.9rem;
            transition: background 0.2s;
        }

        .btn-buy:hover {
            background-color: #a046ff;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">PRZX C0D3D</div>
    </header>

    <div class="container">
        
        <div class="category-title">Categoria De Produto 1</div>

        <div class="product-card">
            <img class="product-image" src="https://cdn.discordapp.com/attachments/998024954039779345/1517523369107656845/file_00000000b12061fdb373fada609b04a7.png?ex=6a369745&is=6a3545c5&hm=6869d3451d12c7097908970f68db771d94f3f694abefb3ba87384fcf4d010590&" alt="OG Menu (Mobile)">
            <div class="product-info">
                <h3 class="product-name">Nome Do Produto</h3>
                <p class="product-price">R$ 9,90</p>
                <p class="payment-method">À vista no PIX</p>
                <a href="#" class="btn-buy">Ver Detalhes</a>
            </div>
        </div>

        <div class="category-title">Categoria De Produto 2</div>

        <div class="product-card">
            <img class="product-image" src="https://cdn.discordapp.com/attachments/998024954039779345/1517523369107656845/file_00000000b12061fdb373fada609b04a7.png?ex=6a369745&is=6a3545c5&hm=6869d3451d12c7097908970f68db771d94f3f694abefb3ba87384fcf4d010590&" alt="CS2 Elysium">
            <div class="product-info">
                <h3 class="product-name">Nome Do Produto</h3>
                <p class="product-price">R$ 20,00</p>
                <p class="payment-method">À vista no PIX</p>
                <a href="#" class="btn-buy">Ver Detalhes</a>
            </div>
        </div>

    </div>

</body>
</html>
